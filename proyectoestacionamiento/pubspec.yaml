  web_socket_channel: ^3.0.0 # 👈 AGREGADO PARA WEBSOCKETS (Tiempo Real)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/