name: proyectoestacionamiento
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.18.0
  cupertino_icons: ^1.0.8

  # Paquetes necesarios para el mapa y ubicación
  google_maps_flutter: ^2.5.0
